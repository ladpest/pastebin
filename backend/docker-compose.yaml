services:
  discovery-server:
    image: discovery-server
    build:
      context: discovery-server
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: discovery-server
    container_name: discovery-server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "8761:8761"
    networks:
      - microservices

  paste-service:
    image: paste-service
    build:
      context: paste-service
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: paste-service
    container_name: paste-service
    expose:
      - "8081"
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - microservices
  
  api-gateway:
    image: api-gateway
    build:
      context: api-gateway
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - microservices

networks:
  microservices: