name: CI - Build and Test

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  
jobs:
  backend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build all backend services
        run: |
          mvn -f "backend/pom.xml" clean verify
      
      
